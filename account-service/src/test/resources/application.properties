spring.application.name=AccountService
server.port=8082


spring.r2dbc.url=r2dbc:mysql://localhost:3306/bank_db
spring.r2dbc.username=appuser
spring.r2dbc.password=password

# Pool de conexiones reactivo
spring.r2dbc.pool.initial-size=5
spring.r2dbc.pool.max-size=20

# Logging de SQL (Equivalente a show-sql)
logging.level.org.springframework.r2dbc=DEBUG

spring.kafka.bootstrap-servers=localhost:9092
# El Group ID es vital: identifica a este microservicio ante Kafka
spring.kafka.consumer.group-id=accounts-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.value.default.type=com.bank.account.domain.model.CustomerEvent

# Configuracion del deserializador para convertir JSON a nuestro DTO
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.trusted.packages=*